name: Verify Build & Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build:
    name: Build & Test
    runs-on: ubuntu-latest

    env:
      FLOW_RUN_INTEGRATION_TESTS: 'false'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.3.13

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run ESLint
        run: bun run lint

      - name: Check Prettier formatting
        run: bunx prettier --check 'src/**/*.{ts,tsx,js,jsx,json,css,scss,md}'

      - name: Compile TypeScript
        run: bun run build

      - name: Run unit tests
        run: bun run test:unit
